version: "2"
rounds:
  # ---------------------------------------------------------------- #
  # K2 — Modell-Intro (Stimme über Kopfhörer)
  # ---------------------------------------------------------------- #
  - id: k2_intro
    question: "Modell-Intro"
    type: narration
    duration_s: 0
    grace_s: 0
    points: 0
    # Placeholder voice (macOS "say") — replace with the real recording or
    # ElevenLabs render before the show.
    audio: k2_intro.mp3
    text: |
      Hallo, herzlich willkommen.
      Schön, dass du dich für die "KI-Blackbox" entschieden hast.
      Heute Abend entwickeln wir gemeinsam ein neues Mensch-Maschine-System.
      Kein fertiges Produkt.
      Kein Prototyp aus einem Forschungslabor.
      Kein Milliardenprojekt eines Technologiekonzerns.
      Unser Modell existiert noch nicht.
      Es beginnt genau jetzt.
      Mit dir.
      Vielleicht fragst du dich, warum ausgerechnet Menschen ein KI-Modell bauen sollten.
      Die meisten Systeme, die unseren Alltag prägen, entstehen hinter verschlossenen Türen. In Rechenzentren. In Forschungslaboren. In Unternehmen mit enormen Ressourcen. Ihre Funktionsweise bleibt oft verborgen. Ihre Entscheidungen erscheinen objektiv, obwohl sie auf zahllosen Annahmen beruhen.
      Heute Abend drehen wir diese Logik um.
      Wir öffnen die Blackbox.
      Oder zumindest versuchen wir es.
      Dafür brauchen wir keine Milliarden Parameter.
      Wir brauchen euch.
      Eure Körper.
      Eure Entscheidungen.
      Eure Bewegungen.
      Eure Aufmerksamkeit.
      In den nächsten Minuten wird aus einer Gruppe von Besucher:innen langsam ein gemeinsames Modell entstehen.
      Ein hybrides Modell.
      Nicht ausschließlich menschlich.
      Nicht ausschließlich künstlich.
      Eine Zusammenarbeit zwischen natürlicher und künstlicher Intelligenz.
      Zwischen Wahrnehmung und Berechnung.
      Zwischen Theater und Algorithmus.
      Im Verlauf des Abends werden unterschiedliche Systeme miteinander arbeiten.
      Große Sprachmodelle.
      Computer Vision.
      Programme, die Muster erkennen.
      Programme, die Sprache erzeugen.
      Und ihr.
      Nicht als Publikum, sondern als lebendige Bestandteile dieses Systems.
      Jede Bewegung kann Bedeutung bekommen.
      Jede Position kann zu Information werden.
      Jede Entscheidung kann eine Berechnung verändern.
      Vielleicht werden wir später verstehen, wie dieses Modell funktioniert.
      Vielleicht auch nicht.
      Denn jede Blackbox bleibt in gewisser Weise eine Blackbox.
      Auch diese hier.
      Es geht heute Abend nicht darum, alle Antworten zu finden.
      Sondern gemeinsam zu beobachten, wie Antworten entstehen.
      Und wer oder was sie eigentlich erzeugt.
      Noch seid ihr einfach hier.
      Gleich beginnt das Modell von euch zu lernen.
      Und vielleicht beginnt gleichzeitig etwas anderes.
      Nicht nur die Maschine verändert sich.
      Vielleicht verändert sich auch eure Vorstellung davon, was eine Maschine überhaupt ist.
      Lasst uns beginnen.

      Das Training eines KI-Modells gliedert sich in Epochen. Wir beginnen mit der Trainingsepoche "Arbeit". Erinnere dich an deine bisherige Arbeit. Deine Arbeit in der Welt außerhalb unserer Blackbox.

  # ---------------------------------------------------------------- #
  # K3 — Trainingsstrecke: Arbeit
  # ---------------------------------------------------------------- #
  - id: k3_intro
    question: "Trainingsepoche: Arbeit"
    type: narration
    duration_s: 0
    grace_s: 0
    points: 0
    text: |
      Auf dem Boden siehst du verschiedenfarbige Markierungen. Positioniere dich auf ihnen entsprechend der Fragen, die du gleich gestellt bekommst. Es gibt drei verschiedene Arten von Markierungen. Für sie gelten unterschiedliche Regeln:
      Bei der rosa Linie gilt: Ordne dich auf ihr zwischen zwei verschiedenen Polen ein. Wie auf einer einfachen Skala.
      Für die rosa und die grüne Markierung zusammen gilt: Ordne dich auf dem Feld ein, das die beiden Achsen zusammen ergeben. Was sie bedeuten, musst du dabei gleichzeitig berücksichtigen.
      Bei den blauen Kreisringen gilt: Die Mitte steht für maximale Zustimmung. Je weiter du dich von der Mitte entfernst, desto geringer ist deine Zustimmung. Wenn du einer Aussage überhaupt nicht zustimmst, bewege dich an den Rand der Kreisringe.
      Bitte stellt euch zu Beginn so auf, dass ihr den Vorhang vor euch habt.
      Lasst uns beginnen.

  - id: arbeit_1
    question: "Wie fühlt sich deine bisherige Arbeit für dich an?"
    type: majority
    duration_s: 45
    grace_s: 5
    points: 0
    form: scale
    form_labels:
      left: "Ich liebe diese Arbeit"
      right: "Diese Arbeit ist nicht auszuhalten"
    # Placeholder voice (macOS "say") — see k2_intro.
    audio: arbeit_1.mp3
    text: |
      Wie fühlt sich deine bisherige Arbeit für dich an?
      Positioniere dich auf der rosa Skala zwischen links "Ich liebe diese Arbeit" und rechts "Diese Arbeit ist nicht auszuhalten".
    options:
      - zone: scale_left
        label: "Ich liebe diese Arbeit"
      - zone: scale_mid
        label: "Mitte"
      - zone: scale_right
        label: "Diese Arbeit ist nicht auszuhalten"

  - id: arbeit_2
    question: "Wie sinnvoll ist deine bisherige Arbeit für dich selbst und wie sinnvoll ist sie für andere?"
    type: majority
    duration_s: 45
    grace_s: 5
    points: 0
    form: cross
    form_labels:
      x_left: "wenig sinnvoll für andere"
      x_right: "sehr sinnvoll für andere"
      y_top: "sehr sinnvoll für mich"
      y_bottom: "wenig sinnvoll für mich"
    text: |
      Wie sinnvoll ist deine bisherige Arbeit für dich selbst und wie sinnvoll ist sie für andere?
      Positioniere dich im Feld zwischen den beiden Achsen. Die grüne Achse zeigt, wie sinnvoll deine bisherige Arbeit für dich selbst ist. Von "wenig sinnvoll für mich" unten bis "sehr sinnvoll für mich" oben. Die rosa Achse zeigt, wie sinnvoll sie für andere ist. Von "wenig sinnvoll für andere" links bis "sehr sinnvoll für andere" rechts.
      Berücksichtige beide Achsen gleichzeitig und wähle die Position, die deiner Einschätzung am besten entspricht.
    options:
      - zone: cross_tl
        label: "sinnvoll für mich, wenig für andere"
      - zone: cross_tr
        label: "sinnvoll für mich und für andere"
      - zone: cross_bl
        label: "wenig sinnvoll für mich und für andere"
      - zone: cross_br
        label: "wenig sinnvoll für mich, sinnvoll für andere"

