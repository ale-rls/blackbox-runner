  - id: k3_intro
    question: "Trainingsepoche: Arbeit"
    type: narration
    duration_s: 0
    grace_s: 0
    points: 0
    text: |
      Auf dem Boden siehst du verschiedenfarbige Markierungen. Positioniere dich auf ihnen entsprechend der Fragen, die du gleich gestellt bekommst. Es gibt drei verschiedene Arten von Markierungen. Für sie gelten unterschiedliche Regeln:
      Bei der rosa Linie gilt: Ordne dich auf ihr zwischen zwei verschiedenen Polen ein. Wie auf einer einfachen Skala 
      Für die rosa und die grüne Markierung zusammen gilt: Ordne dich auf dem Feld ein, das die beiden Achsen zusammen ergeben. Was sie bedeuten, musst du dabei gleichzeitig berücksichtigen.
      Bei den blauen Kreisringen gilt: Die Mitte steht für maximale Zustimmung. Je weiter du von dich von der Mitte entfernst, desto geringer ist deine Zustimmung. Wenn du einer Aussage überhaupt nicht zustimmst, bewege dich an den Rand der Kreisringe.
      Bitte stellt euch zu Beginn so auf, dass ihr den Vorhang vor euch habt.
      Lasst uns beginnen. 

