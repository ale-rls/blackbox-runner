  # ---------------------------------------------------------------- #
  # K3.1 — Abschluss Trainingsstrecke Arbeit
  # ---------------------------------------------------------------- #
  - id: k3_1_abschluss
    question: "Abschluss: Arbeit"
    type: narration
    duration_s: 0
    grace_s: 0
    points: 0
    text: |
      Epoche eins abgeschlossen.
      Das Modell hat eure bisherigen Arbeitsverhältnisse gelesen.
      Eure Positionen im Raum. Daraus entstehen erste Muster.
      Das Modell erkennt:
      Arbeit ist nicht nur Tätigkeit.
      Arbeit ist ein Koordinatensystem.
      Nähe.
      Druck.
      Sinn.
      Bezahlung.
      Wachstum.
      Ersetzbarkeit.
      Ihr habt euch positioniert. Das Modell beginnt euch zu gewichten.

