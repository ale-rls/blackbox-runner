<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Claim your dot</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0a10;
      --panel: #12121b;
      --panel-2: #0e0e16;
      --border: #23232f;
      --text: #eceef4;
      --muted: #8b8d9d;
      --accent: #6d74f6;
      --green: #4ade80;
      --red: #f87171;
      --amber: #fbbf24;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    [hidden] { display: none !important; }
    body {
      margin: 0; min-height: 100dvh; display: flex; flex-direction: column;
      background: var(--bg);
      background-image: radial-gradient(40rem 24rem at 50% -8rem, rgba(109, 116, 246, 0.16), transparent);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .topbar {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.8rem 1rem;
    }
    .topbar .gid-chip {
      font-family: var(--mono); font-weight: 700; font-size: 1.05rem;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 0.5rem; padding: 0.25em 0.7em;
    }
    .topbar .conn { font-size: 0.85rem; font-weight: 600; }
    .topbar .conn.bound { color: var(--green); }
    .topbar .conn.bound::before { content: "● "; }
    .score-chip {
      margin-left: auto; font-weight: 700; font-family: var(--mono);
      background: rgba(109, 116, 246, 0.15); border: 1px solid rgba(109, 116, 246, 0.4);
      color: #aab0ff; border-radius: 999px; padding: 0.25em 0.9em;
    }

    main {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 1.2rem; padding: 1.2rem; text-align: center;
      width: 100%; max-width: 30rem; margin: 0 auto;
    }

    .banner {
      width: 100%; border-radius: 0.8rem; padding: 0.9em 1.1em;
      font-weight: 700; font-size: 1.05rem;
    }
    .banner.ritual {
      background: rgba(251, 191, 36, 0.12); border: 1px solid rgba(251, 191, 36, 0.5);
      color: var(--amber); animation: pulse 1.2s ease-in-out infinite;
    }
    .banner.lost {
      background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.45);
      color: var(--red); font-weight: 600; font-size: 0.95rem;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }

    /* Claim */
    #claim-form { display: flex; flex-direction: column; align-items: center; gap: 1rem; width: 100%; }
    h1 { font-size: 1.35rem; margin: 0; }
    .player-id { color: var(--muted); font-size: 0.95rem; margin-top: -0.8rem; }
    input#gid {
      font-family: var(--mono); font-size: 3rem; font-weight: 700; text-align: center;
      width: 6ch; padding: 0.25em 0.2em; border-radius: 0.7rem;
      border: 2px solid var(--border); background: var(--panel); color: inherit;
      caret-color: var(--accent);
    }
    input#gid:focus { outline: none; border-color: var(--accent); }
    button.claim {
      font: inherit; font-size: 1.15rem; font-weight: 700; width: 100%; max-width: 16rem;
      padding: 0.8em 1.4em; border-radius: 0.7rem; border: none;
      background: var(--accent); color: #fff; cursor: pointer;
    }
    button.claim:active { transform: scale(0.98); }
    button.claim:disabled { opacity: 0.5; }
    .error { color: var(--red); min-height: 1.4em; font-size: 0.9rem; }

    /* Round panel */
    .round-panel { width: 100%; }
    .phase-note { color: var(--muted); font-size: 1.05rem; }
    .question { font-size: 1.55rem; font-weight: 800; line-height: 1.25; }
    .options { display: flex; flex-direction: column; gap: 0.6rem; margin-top: 1.1rem; }
    .option {
      display: flex; justify-content: space-between; align-items: center; gap: 0.8rem;
      background: var(--panel); border: 1px solid var(--border); border-radius: 0.7rem;
      padding: 0.85em 1.1em; font-size: 1.1rem; font-weight: 600; text-align: left;
    }
    .option .count { font-family: var(--mono); color: var(--muted); font-weight: 700; }
    .option.winner {
      border-color: var(--green); color: var(--green);
      box-shadow: 0 0 14px rgba(74, 222, 128, 0.18);
    }
    .option.winner .count { color: var(--green); }

    .countdown-wrap { margin-top: 1.1rem; }
    .countdown { font-size: 0.95rem; color: var(--muted); margin-bottom: 0.45rem; }
    .countdown b { color: var(--text); font-family: var(--mono); font-size: 1.05rem; }
    .timebar { height: 5px; border-radius: 3px; background: var(--panel); overflow: hidden; }
    .timebar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.25s linear; }
    .timebar-fill.low { background: var(--red); }
    .locking { color: var(--amber); font-weight: 600; animation: pulse 1s ease-in-out infinite; }

    .result { font-size: 1.25rem; font-weight: 800; margin-top: 1.2rem; }
    .result.win { color: var(--green); }
    .result.lose { color: var(--red); }
    .result.absent { color: var(--muted); font-weight: 600; }
  </style>
</head>
<body>
  <div class="topbar" id="topbar" hidden>
    <span class="gid-chip" id="gid-display"></span>
    <span class="conn bound">Connected</span>
    <span class="score-chip" id="score-badge" hidden>0 pts</span>
  </div>

  <main>
    <div class="banner ritual" id="ritual-banner" hidden>Walk to the glowing corner ✦</div>
    <div class="banner lost" id="lost-banner" hidden>Lost you — type your new number, or wait for an usher</div>

    <div id="claim-form">
      <h1>Enter the number on your dot</h1>
      <div class="player-id" id="player-id"></div>
      <input id="gid" inputmode="numeric" pattern="[0-9]*" maxlength="5" autofocus autocomplete="off" />
      <div class="error" id="error"></div>
      <button class="claim" id="submit">Claim</button>
    </div>

    <div id="status" hidden>
      <div class="round-panel" id="round-panel"></div>
    </div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const esc = (s) =>
      String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

    const playerId = decodeURIComponent(location.pathname.split("/").filter(Boolean).pop());
    $("player-id").textContent = `Player ${playerId}`;

    const form = $("claim-form");
    const statusEl = $("status");
    const errorEl = $("error");
    const gidInput = $("gid");
    const submitBtn = $("submit");

    async function claim() {
      const gid = parseInt(gidInput.value, 10);
      if (!Number.isFinite(gid)) {
        errorEl.textContent = "Enter the number you were shown.";
        return;
      }
      submitBtn.disabled = true;
      errorEl.textContent = "";
      try {
        const resp = await fetch(`/api/players/${encodeURIComponent(playerId)}/claim`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ gid }),
        });
        if (!resp.ok) {
          const body = await resp.json().catch(() => ({}));
          throw new Error(body.detail || `claim failed (${resp.status})`);
        }
        render(await resp.json());
      } catch (err) {
        errorEl.textContent = err.message;
      } finally {
        submitBtn.disabled = false;
      }
    }

    let wasBound = false;

    function render(player) {
      if (player.state === "bound") {
        form.hidden = true;
        $("lost-banner").hidden = true;
        $("ritual-banner").hidden = true; // rebound, ritual (if any) is resolved
        statusEl.hidden = false;
        $("topbar").hidden = false;
        $("gid-display").textContent = `#${player.gid}`;
        if (!wasBound) connectGameWs();
        wasBound = true;
      } else if (player.state === "lost" || player.state === "orphaned") {
        // Backend allows self-service re-claim from "lost"/"orphaned", so
        // keep the form visible — most players just need to retype their
        // new number, or follow the ritual banner above if one is showing.
        form.hidden = false;
        $("lost-banner").hidden = false;
        statusEl.hidden = true;
        $("topbar").hidden = true;
      } else {
        form.hidden = false;
        $("lost-banner").hidden = true;
        $("ritual-banner").hidden = true;
        statusEl.hidden = true;
        $("topbar").hidden = true;
      }
    }

    async function poll() {
      try {
        const resp = await fetch(`/api/players/${encodeURIComponent(playerId)}`);
        if (resp.ok) render(await resp.json());
      } catch (err) {
        // network hiccup: keep last known UI, try again next tick
      }
    }

    // ---- round panel (driven by /ws/player/{id}) ----
    const roundPanel = $("round-panel");
    const scoreBadge = $("score-badge");
    let countdownTimer = null;

    function setScore(points) {
      scoreBadge.textContent = `${points} pts`;
      scoreBadge.hidden = false;
    }

    function optionsHtml(round, { winners = null, tally = null } = {}) {
      return round.options
        .map((o) => {
          const isWinner = winners && winners.has(o.zone);
          const count = tally ? `<span class="count">${tally[o.zone] || 0}</span>` : "";
          return `<div class="option${isWinner ? " winner" : ""}">${esc(o.label)}${count}</div>`;
        })
        .join("");
    }

    function renderRound(round) {
      clearInterval(countdownTimer);
      if (!round) {
        roundPanel.innerHTML = `<div class="phase-note">Waiting for the next round…</div>`;
        return;
      }
      roundPanel.innerHTML = `
        <div class="question">${esc(round.question)}</div>
        <div class="options">${optionsHtml(round)}</div>
        <div class="countdown-wrap" id="countdown-wrap"></div>
      `;
      const wrap = $("countdown-wrap");
      if (round.state === "active" && round.opened_at) {
        wrap.innerHTML = `
          <div class="countdown" id="countdown-text"></div>
          <div class="timebar"><div class="timebar-fill" id="timebar-fill"></div></div>
        `;
        const endsAt = (round.opened_at + round.duration_s) * 1000;
        const tick = () => {
          const textEl = $("countdown-text");
          const fillEl = $("timebar-fill");
          if (!textEl || !fillEl) return;
          const msLeft = Math.max(0, endsAt - Date.now());
          const secs = Math.ceil(msLeft / 1000);
          textEl.innerHTML = secs > 0 ? `<b>${secs}s</b> — move to your answer` : "Time's up!";
          const pct = Math.min(100, (msLeft / (round.duration_s * 1000)) * 100);
          fillEl.style.width = `${pct}%`;
          fillEl.className = `timebar-fill${msLeft < 5000 ? " low" : ""}`;
        };
        tick();
        countdownTimer = setInterval(tick, 250);
      } else if (round.state === "closing") {
        wrap.innerHTML = `<div class="locking">Locking in answers…</div>`;
      }
    }

    function renderReveal(round, yourAnswer) {
      clearInterval(countdownTimer);
      const winners = new Set(round.winning_zones || []);
      const won = yourAnswer && yourAnswer.zone && winners.has(yourAnswer.zone);
      const absent = !yourAnswer || yourAnswer.resolved === "absent";
      const resultText = absent ? "You didn't answer this one" : won ? "You scored!" : "Not this time";
      const resultCls = absent ? "absent" : won ? "win" : "lose";
      roundPanel.innerHTML = `
        <div class="question">${esc(round.question)}</div>
        <div class="options">${optionsHtml(round, { winners, tally: round.tally || {} })}</div>
        <div class="result ${resultCls}">${resultText}</div>
      `;
    }

    function connectGameWs() {
      const proto = location.protocol === "https:" ? "wss" : "ws";
      const ws = new WebSocket(`${proto}://${location.host}/ws/player/${encodeURIComponent(playerId)}`);
      ws.onmessage = (evt) => {
        const msg = JSON.parse(evt.data);
        if (msg.type === "hello") {
          renderRound(msg.round);
          if (msg.scores && msg.scores[playerId] !== undefined) setScore(msg.scores[playerId]);
        } else if (msg.type === "round_opened" || msg.type === "round_closing" || msg.type === "answers_locked") {
          renderRound(msg);
        } else if (msg.type === "reveal") {
          renderReveal(msg, msg.your_answer);
        } else if (msg.type === "scores_updated") {
          setScore(msg.your_score || 0);
        } else if (msg.type === "ritual_prompt" && msg.player_id === playerId) {
          $("ritual-banner").hidden = false;
        }
      };
      ws.onclose = () => setTimeout(() => { if (wasBound) connectGameWs(); }, 1500);
    }

    submitBtn.addEventListener("click", claim);
    gidInput.addEventListener("keydown", (e) => { if (e.key === "Enter") claim(); });
    poll();
    setInterval(poll, 3000);
  </script>
</body>
</html>
