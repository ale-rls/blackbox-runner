<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>KI-Blackbox</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0a10;
      --panel: #12121b;
      --panel-2: #0e0e16;
      --border: #23232f;
      --text: #eceef4;
      --muted: #8b8d9d;
      --accent: #6d74f6;
      --green: #4ade80;
      --red: #f87171;
      --amber: #fbbf24;
      --rosa: #f472b6;
      --gruen: #4ade80;
      --blau: #60a5fa;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    [hidden] { display: none !important; }
    body {
      margin: 0; min-height: 100dvh; display: flex; flex-direction: column;
      background: var(--bg);
      background-image: radial-gradient(40rem 24rem at 50% -8rem, rgba(109, 116, 246, 0.16), transparent);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .topbar {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.8rem 1rem;
    }
    .topbar .gid-chip {
      font-family: var(--mono); font-weight: 700; font-size: 1.05rem;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 0.5rem; padding: 0.25em 0.7em;
    }
    .topbar .conn { font-size: 0.85rem; font-weight: 600; }
    .topbar .conn.bound { color: var(--green); }
    .topbar .conn.bound::before { content: "● "; }
    .score-chip {
      margin-left: auto; font-weight: 700; font-family: var(--mono);
      background: rgba(109, 116, 246, 0.15); border: 1px solid rgba(109, 116, 246, 0.4);
      color: #aab0ff; border-radius: 999px; padding: 0.25em 0.9em;
    }

    main {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 1.2rem; padding: 1.2rem; text-align: center;
      width: 100%; max-width: 30rem; margin: 0 auto;
    }

    .banner {
      width: 100%; border-radius: 0.8rem; padding: 0.9em 1.1em;
      font-weight: 700; font-size: 1.05rem;
    }
    .banner.ritual {
      background: rgba(251, 191, 36, 0.12); border: 1px solid rgba(251, 191, 36, 0.5);
      color: var(--amber); animation: pulse 1.2s ease-in-out infinite;
    }
    .banner.lost {
      background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.45);
      color: var(--red); font-weight: 600; font-size: 0.95rem;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }

    /* Claim */
    #claim-form { display: flex; flex-direction: column; align-items: center; gap: 1rem; width: 100%; }
    h1 { font-size: 1.35rem; margin: 0; }
    .player-id { color: var(--muted); font-size: 0.95rem; margin-top: -0.8rem; }
    input#gid {
      font-family: var(--mono); font-size: 3rem; font-weight: 700; text-align: center;
      width: 6ch; padding: 0.25em 0.2em; border-radius: 0.7rem;
      border: 2px solid var(--border); background: var(--panel); color: inherit;
      caret-color: var(--accent);
    }
    input#gid:focus { outline: none; border-color: var(--accent); }
    button.claim {
      font: inherit; font-size: 1.15rem; font-weight: 700; width: 100%; max-width: 16rem;
      padding: 0.8em 1.4em; border-radius: 0.7rem; border: none;
      background: var(--accent); color: #fff; cursor: pointer;
    }
    button.claim:active { transform: scale(0.98); }
    button.claim:disabled { opacity: 0.5; }
    .error { color: var(--red); min-height: 1.4em; font-size: 0.9rem; }

    /* Round panel */
    .round-panel { width: 100%; }
    .phase-note { color: var(--muted); font-size: 1.05rem; }
    .question { font-size: 1.45rem; font-weight: 800; line-height: 1.25; }
    .step-text {
      margin-top: 1rem; text-align: left; white-space: pre-line;
      font-size: 1.02rem; line-height: 1.55; color: var(--text);
    }
    .step-text.narration { font-size: 1.12rem; }
    .listen-note { color: var(--muted); font-size: 0.9rem; margin-top: 1rem; }
    .replay-row { margin-top: 1rem; }
    button.replay {
      font: inherit; font-size: 0.95rem; font-weight: 600;
      padding: 0.55em 1.1em; border-radius: 999px; cursor: pointer;
      background: var(--panel); border: 1px solid var(--border); color: var(--text);
    }
    button.replay:active { transform: scale(0.97); }

    .options { display: flex; flex-direction: column; gap: 0.6rem; margin-top: 1.1rem; }
    .option {
      display: flex; justify-content: space-between; align-items: center; gap: 0.8rem;
      background: var(--panel); border: 1px solid var(--border); border-radius: 0.7rem;
      padding: 0.85em 1.1em; font-size: 1.1rem; font-weight: 600; text-align: left;
    }
    .option .count { font-family: var(--mono); color: var(--muted); font-weight: 700; }
    .option.winner {
      border-color: var(--green); color: var(--green);
      box-shadow: 0 0 14px rgba(74, 222, 128, 0.18);
    }
    .option.winner .count { color: var(--green); }

    /* Form visuals: mirror the floor markings */
    .form-visual { margin-top: 1.3rem; }
    .scale-line {
      height: 6px; border-radius: 3px; background: var(--rosa);
      box-shadow: 0 0 12px rgba(244, 114, 182, 0.4);
    }
    .scale-labels {
      display: flex; justify-content: space-between; gap: 0.8rem; margin-top: 0.6rem;
      font-size: 0.92rem; font-weight: 600;
    }
    .scale-labels span { max-width: 45%; }
    .scale-labels span:first-child { text-align: left; }
    .scale-labels span:last-child { text-align: right; }
    .scale-labels.three span { max-width: 32%; }
    .scale-labels.three span:nth-child(2) { text-align: center; color: var(--muted); }

    .cross { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
    .cross-label { font-size: 0.92rem; font-weight: 600; }
    .cross-label.y { color: var(--gruen); }
    .cross-label.x { color: var(--rosa); }
    .cross-mid { display: flex; align-items: center; gap: 0.6rem; width: 100%; justify-content: center; }
    .cross-mid .cross-label { flex: 1; }
    .cross-mid .cross-label:first-child { text-align: right; }
    .cross-mid .cross-label:last-child { text-align: left; }
    .cross-box {
      position: relative; width: 9.5rem; height: 9.5rem; flex-shrink: 0;
      border: 1px solid var(--border); border-radius: 0.6rem; background: var(--panel-2);
    }
    .cross-box .axis-v {
      position: absolute; left: 50%; top: 6%; bottom: 6%; width: 4px; margin-left: -2px;
      background: var(--gruen); border-radius: 2px; box-shadow: 0 0 10px rgba(74, 222, 128, 0.4);
    }
    .cross-box .axis-h {
      position: absolute; top: 50%; left: 6%; right: 6%; height: 4px; margin-top: -2px;
      background: var(--rosa); border-radius: 2px; box-shadow: 0 0 10px rgba(244, 114, 182, 0.4);
    }

    .quadrants {
      display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
      padding: 6px; border-radius: 0.8rem;
      background: linear-gradient(to right, var(--rosa), var(--gruen));
    }
    .quadrant {
      background: var(--panel-2); border-radius: 0.5rem; padding: 1.1em 0.7em;
      font-size: 0.98rem; font-weight: 700; min-height: 4.4em;
      display: flex; align-items: center; justify-content: center;
    }

    .rings { display: flex; flex-direction: column; align-items: center; gap: 0.7rem; }
    .ring { border: 3px solid var(--blau); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .ring.outer { width: 13rem; height: 13rem; opacity: 0.45; }
    .ring.middle { width: 9.2rem; height: 9.2rem; opacity: 0.7; }
    .ring.inner { width: 5.4rem; height: 5.4rem; opacity: 1; box-shadow: 0 0 14px rgba(96, 165, 250, 0.45); }
    .ring-center-label { font-size: 0.8rem; font-weight: 700; color: var(--blau); padding: 0.3em; line-height: 1.2; }
    .ring-edge-label { font-size: 0.92rem; font-weight: 600; color: var(--muted); }
    .ring-edge-label b { color: var(--text); }

    .countdown-wrap { margin-top: 1.1rem; }
    .countdown { font-size: 0.95rem; color: var(--muted); margin-bottom: 0.45rem; }
    .countdown b { color: var(--text); font-family: var(--mono); font-size: 1.05rem; }
    .timebar { height: 5px; border-radius: 3px; background: var(--panel); overflow: hidden; }
    .timebar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.25s linear; }
    .timebar-fill.low { background: var(--red); }
    .locking { color: var(--amber); font-weight: 600; animation: pulse 1s ease-in-out infinite; }

    .result { font-size: 1.25rem; font-weight: 800; margin-top: 1.2rem; }
    .result.win { color: var(--green); }
    .result.lose { color: var(--red); }
    .result.absent { color: var(--muted); font-weight: 600; }

    /* Audio unlock overlay */
    #audio-unlock {
      position: fixed; inset: 0; z-index: 10;
      background: rgba(10, 10, 16, 0.88); backdrop-filter: blur(4px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 0.8rem; cursor: pointer; text-align: center; padding: 2rem;
    }
    #audio-unlock .icon { font-size: 3rem; }
    #audio-unlock .label { font-size: 1.15rem; font-weight: 700; }
    #audio-unlock .sub { color: var(--muted); font-size: 0.95rem; }
  </style>
</head>
<body>
  <div class="topbar" id="topbar" hidden>
    <span class="gid-chip" id="gid-display"></span>
    <span class="conn bound">Verbunden</span>
    <span class="score-chip" id="score-badge" hidden>0 Punkte</span>
  </div>

  <div id="audio-unlock" hidden>
    <div class="icon">🔊</div>
    <div class="label">Tippen, um den Ton zu starten</div>
    <div class="sub">Setz deine Kopfhörer auf</div>
  </div>

  <main>
    <div class="banner ritual" id="ritual-banner" hidden>Geh zur leuchtenden Ecke ✦</div>
    <div class="banner lost" id="lost-banner" hidden>Wir haben dich verloren — gib deine neue Nummer ein oder warte auf das Personal</div>

    <div id="claim-form">
      <h1>Willkommen in der KI-Blackbox</h1>
      <div class="player-id" id="player-id"></div>
      <p class="phase-note" style="margin:0">Gib die Nummer auf deinem Punkt ein</p>
      <input id="gid" inputmode="numeric" pattern="[0-9]*" maxlength="5" autofocus autocomplete="off" />
      <div class="error" id="error"></div>
      <button class="claim" id="submit">Verbinden</button>
    </div>

    <div id="status" hidden>
      <div class="round-panel" id="round-panel"></div>
    </div>
  </main>

  <audio id="narration" preload="auto"></audio>

  <script>
    const $ = (id) => document.getElementById(id);
    const esc = (s) =>
      String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

    const playerId = decodeURIComponent(location.pathname.split("/").filter(Boolean).pop());
    $("player-id").textContent = `Gerät ${playerId}`;

    const form = $("claim-form");
    const statusEl = $("status");
    const errorEl = $("error");
    const gidInput = $("gid");
    const submitBtn = $("submit");

    // ---- narration audio ----
    // Browsers only allow playback after a user gesture. The claim tap doubles
    // as that gesture; players who reconnect already-bound never tap anything,
    // so they get the unlock overlay instead.
    const narration = $("narration");
    const unlockOverlay = $("audio-unlock");
    // 44-byte silent WAV: a playable src for the unlock gesture.
    const SILENCE = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YQAAAAA=";
    let audioUnlocked = false;
    let pendingAudioUrl = null;

    function unlockAudio() {
      if (audioUnlocked) return;
      audioUnlocked = true;
      unlockOverlay.hidden = true;
      if (pendingAudioUrl) {
        playAudio(pendingAudioUrl);
      } else {
        narration.src = SILENCE;
        narration.play().catch(() => {});
      }
    }

    function playAudio(url) {
      if (!url) return;
      if (!audioUnlocked) {
        pendingAudioUrl = url;
        unlockOverlay.hidden = false;
        return;
      }
      pendingAudioUrl = null;
      narration.src = url;
      narration.play().catch((err) => {
        // AbortError just means a newer step's audio superseded this play()
        // mid-load — the newer one is already playing, nothing to do.
        if (err && err.name === "AbortError") return;
        // Playback was blocked after all (e.g. iOS revoked the unlock):
        // fall back to an explicit tap.
        audioUnlocked = false;
        pendingAudioUrl = url;
        unlockOverlay.hidden = false;
      });
    }

    unlockOverlay.addEventListener("click", unlockAudio);

    async function claim() {
      const gid = parseInt(gidInput.value, 10);
      if (!Number.isFinite(gid)) {
        errorEl.textContent = "Gib die Nummer ein, die dir gezeigt wurde.";
        return;
      }
      unlockAudio(); // the tap that claims is also the tap that unlocks audio
      submitBtn.disabled = true;
      errorEl.textContent = "";
      try {
        const resp = await fetch(`/api/players/${encodeURIComponent(playerId)}/claim`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ gid }),
        });
        if (!resp.ok) {
          const body = await resp.json().catch(() => ({}));
          throw new Error(body.detail || `Verbindung fehlgeschlagen (${resp.status})`);
        }
        render(await resp.json());
      } catch (err) {
        errorEl.textContent = err.message;
      } finally {
        submitBtn.disabled = false;
      }
    }

    let wasBound = false;

    function render(player) {
      if (player.state === "bound") {
        form.hidden = true;
        $("lost-banner").hidden = true;
        $("ritual-banner").hidden = true; // rebound, ritual (if any) is resolved
        statusEl.hidden = false;
        $("topbar").hidden = false;
        $("gid-display").textContent = `#${player.gid}`;
        if (!wasBound) connectGameWs();
        wasBound = true;
      } else if (player.state === "lost" || player.state === "orphaned") {
        // Backend allows self-service re-claim from "lost"/"orphaned", so
        // keep the form visible — most players just need to retype their
        // new number, or follow the ritual banner above if one is showing.
        form.hidden = false;
        $("lost-banner").hidden = false;
        statusEl.hidden = true;
        $("topbar").hidden = true;
      } else {
        form.hidden = false;
        $("lost-banner").hidden = true;
        $("ritual-banner").hidden = true;
        statusEl.hidden = true;
        $("topbar").hidden = true;
      }
    }

    async function poll() {
      try {
        const resp = await fetch(`/api/players/${encodeURIComponent(playerId)}`);
        if (resp.ok) render(await resp.json());
      } catch (err) {
        // network hiccup: keep last known UI, try again next tick
      }
    }

    // ---- round panel (driven by /ws/player/{id}) ----
    const roundPanel = $("round-panel");
    const scoreBadge = $("score-badge");
    let countdownTimer = null;

    function setScore(points) {
      // The narrated show runs with points: 0 — only surface a score when
      // there is actually one to show.
      if (!points) { scoreBadge.hidden = true; return; }
      scoreBadge.textContent = `${points} Punkte`;
      scoreBadge.hidden = false;
    }

    function optionsHtml(round, { winners = null, tally = null } = {}) {
      return round.options
        .map((o) => {
          const isWinner = winners && winners.has(o.zone);
          const count = tally ? `<span class="count">${tally[o.zone] || 0}</span>` : "";
          return `<div class="option${isWinner ? " winner" : ""}">${esc(o.label)}${count}</div>`;
        })
        .join("");
    }

    // ---- form visuals: on-screen mirrors of the floor markings ----
    function scaleHtml(labels) {
      const spans = labels.filter((l) => l !== undefined).map((l) => `<span>${esc(l || "")}</span>`).join("");
      return `
        <div class="form-visual">
          <div class="scale-line"></div>
          <div class="scale-labels${labels.length === 3 ? " three" : ""}">${spans}</div>
        </div>`;
    }

    function crossHtml(fl) {
      return `
        <div class="form-visual cross">
          <div class="cross-label y">${esc(fl.y_top || "")}</div>
          <div class="cross-mid">
            <div class="cross-label x">${esc(fl.x_left || "")}</div>
            <div class="cross-box"><div class="axis-v"></div><div class="axis-h"></div></div>
            <div class="cross-label x">${esc(fl.x_right || "")}</div>
          </div>
          <div class="cross-label y">${esc(fl.y_bottom || "")}</div>
        </div>`;
    }

    function quadrantsHtml(options) {
      const cells = options.map((o) => `<div class="quadrant">${esc(o.label)}</div>`).join("");
      return `<div class="form-visual quadrants">${cells}</div>`;
    }

    function ringsHtml(fl) {
      return `
        <div class="form-visual rings">
          <div class="ring outer"><div class="ring middle"><div class="ring inner">
            <span class="ring-center-label">${esc(fl.center || "")}</span>
          </div></div></div>
          <div class="ring-edge-label">Rand: <b>${esc(fl.edge || "")}</b></div>
        </div>`;
    }

    function formHtml(round) {
      const fl = round.form_labels || {};
      switch (round.form) {
        case "scale": return scaleHtml([fl.left, fl.right]);
        case "scale3": return scaleHtml([fl.left, fl.middle, fl.right]);
        case "cross": return crossHtml(fl);
        case "quadrants": return quadrantsHtml(round.options || []);
        case "rings": return ringsHtml(fl);
        default: return `<div class="options">${optionsHtml(round)}</div>`;
      }
    }

    function replayHtml(round) {
      if (!round.audio_url) return "";
      return `<div class="replay-row"><button class="replay" id="replay-btn">↺ Nochmal hören</button></div>`;
    }

    function wireReplay(round) {
      const btn = $("replay-btn");
      if (btn) btn.addEventListener("click", () => playAudio(round.audio_url));
    }

    function renderRound(round) {
      clearInterval(countdownTimer);
      if (!round) {
        roundPanel.innerHTML = `<div class="phase-note">Warte auf den nächsten Schritt…</div>`;
        return;
      }

      if (round.round_type === "narration") {
        roundPanel.innerHTML = `
          <div class="question">${esc(round.question)}</div>
          <div class="step-text narration">${esc(round.text || "")}</div>
          ${replayHtml(round)}
          <div class="listen-note">Hör zu — es geht gleich weiter.</div>
        `;
        wireReplay(round);
        return;
      }

      roundPanel.innerHTML = `
        <div class="question">${esc(round.question)}</div>
        ${round.text ? `<div class="step-text">${esc(round.text)}</div>` : ""}
        ${formHtml(round)}
        ${replayHtml(round)}
        <div class="countdown-wrap" id="countdown-wrap"></div>
      `;
      wireReplay(round);
      const wrap = $("countdown-wrap");
      if (round.state === "active" && round.opened_at && round.duration_s > 0) {
        wrap.innerHTML = `
          <div class="countdown" id="countdown-text"></div>
          <div class="timebar"><div class="timebar-fill" id="timebar-fill"></div></div>
        `;
        const endsAt = (round.opened_at + round.duration_s) * 1000;
        const tick = () => {
          const textEl = $("countdown-text");
          const fillEl = $("timebar-fill");
          if (!textEl || !fillEl) return;
          const msLeft = Math.max(0, endsAt - Date.now());
          const secs = Math.ceil(msLeft / 1000);
          textEl.innerHTML = secs > 0 ? `<b>${secs}s</b> — finde deine Position` : "Die Zeit ist um!";
          const pct = Math.min(100, (msLeft / (round.duration_s * 1000)) * 100);
          fillEl.style.width = `${pct}%`;
          fillEl.className = `timebar-fill${msLeft < 5000 ? " low" : ""}`;
        };
        tick();
        countdownTimer = setInterval(tick, 250);
      } else if (round.state === "closing") {
        wrap.innerHTML = `<div class="locking">Positionen werden gespeichert…</div>`;
      }
    }

    function renderReveal(round, yourAnswer) {
      clearInterval(countdownTimer);
      if (round.round_type === "narration") return; // narration steps just end
      const winners = new Set(round.winning_zones || []);
      const absent = !yourAnswer || !yourAnswer.zone;
      let resultText, resultCls;
      if (absent) {
        resultText = "Keine Position erfasst";
        resultCls = "absent";
      } else {
        const opt = (round.options || []).find((o) => o.zone === yourAnswer.zone);
        resultText = `Erfasst: ${opt ? opt.label : yourAnswer.zone}`;
        resultCls = winners.has(yourAnswer.zone) ? "win" : "";
      }
      roundPanel.innerHTML = `
        <div class="question">${esc(round.question)}</div>
        <div class="options">${optionsHtml(round, { winners, tally: round.tally || {} })}</div>
        <div class="result ${resultCls}">${esc(resultText)}</div>
      `;
    }

    function connectGameWs() {
      const proto = location.protocol === "https:" ? "wss" : "ws";
      const ws = new WebSocket(`${proto}://${location.host}/ws/player/${encodeURIComponent(playerId)}`);
      ws.onmessage = (evt) => {
        const msg = JSON.parse(evt.data);
        if (msg.type === "hello") {
          renderRound(msg.round);
          // Joining mid-step: catch up on the running narration/question audio.
          if (msg.round && msg.round.state === "active") playAudio(msg.round.audio_url);
          if (msg.scores && msg.scores[playerId] !== undefined) setScore(msg.scores[playerId]);
        } else if (msg.type === "round_opened") {
          renderRound(msg);
          playAudio(msg.audio_url);
        } else if (msg.type === "round_closing" || msg.type === "answers_locked") {
          renderRound(msg);
        } else if (msg.type === "reveal") {
          renderReveal(msg, msg.your_answer);
        } else if (msg.type === "scores_updated") {
          setScore(msg.your_score || 0);
        } else if (msg.type === "ritual_prompt" && msg.player_id === playerId) {
          $("ritual-banner").hidden = false;
        }
      };
      ws.onclose = () => setTimeout(() => { if (wasBound) connectGameWs(); }, 1500);
    }

    submitBtn.addEventListener("click", claim);
    gidInput.addEventListener("keydown", (e) => { if (e.key === "Enter") claim(); });
    poll();
    setInterval(poll, 3000);
  </script>
</body>
</html>
