<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Theater Game — Binding Board</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; padding: 1.5rem;
      background: #0b0b12; color: #f4f4f8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    h1 { font-size: 1.2rem; margin: 0 0 1rem; }
    .conn { font-size: 0.85rem; opacity: 0.7; margin-bottom: 1rem; }
    .conn.ok { color: #4ade80; }
    .conn.down { color: #f87171; }
    table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
    th, td { text-align: left; padding: 0.5rem 0.7rem; border-bottom: 1px solid #26262f; }
    th { opacity: 0.6; font-weight: 500; text-transform: uppercase; font-size: 0.75rem; }
    .state { padding: 0.15rem 0.5rem; border-radius: 0.4rem; font-size: 0.8rem; font-weight: 600; }
    .state.bound { background: #16321f; color: #4ade80; }
    .state.lost { background: #351818; color: #f87171; }
    .state.unclaimed { background: #33291a; color: #fbbf24; }
    .state.orphaned { background: #33291a; color: #fbbf24; }
    .state.left { background: #222; color: #999; }
    input.rebind-gid { width: 5em; background: #16161f; border: 1px solid #444; color: inherit; padding: 0.2em 0.4em; border-radius: 0.3em; }
    button { background: #5b6bf6; color: white; border: none; padding: 0.3em 0.8em; border-radius: 0.3em; cursor: pointer; }
    button:disabled { opacity: 0.4; cursor: default; }
    .empty { opacity: 0.5; padding: 2rem 0; text-align: center; }
    section { margin-bottom: 2rem; }
    .round-status { font-size: 0.95rem; opacity: 0.85; margin: 0.5rem 0; }
    .round-controls { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; }
    .scoreboard { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .score-chip { background: #16161f; border: 1px solid #333; border-radius: 0.4rem; padding: 0.3em 0.7em; font-size: 0.9rem; }
    .cue-form { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; }
    .cue-form input { background: #16161f; border: 1px solid #444; color: inherit; padding: 0.3em 0.6em; border-radius: 0.3em; }
    .cue-form input#cue-type { width: 10em; }
    .cue-form input#cue-payload { flex: 1; }
    .cue-log { max-height: 10rem; overflow-y: auto; font-family: ui-monospace, monospace; font-size: 0.8rem; background: #101018; border: 1px solid #26262f; border-radius: 0.4rem; padding: 0.5rem; }
    .cue-log div { padding: 0.1rem 0; border-bottom: 1px solid #1a1a22; }
  </style>
</head>
<body>
  <section>
    <h1>Round control</h1>
    <div class="round-controls">
      <button onclick="roundAction('start')">Start next round</button>
      <button onclick="roundAction('close')">Close</button>
      <button onclick="roundAction('reveal')">Reveal</button>
    </div>
    <div class="round-status" id="round-status">No round loaded.</div>
  </section>

  <section>
    <h1>TD cue stream (/ws/td)</h1>
    <div class="conn down" id="td-conn">connecting…</div>
    <div class="cue-form">
      <input id="cue-type" placeholder="cue type, e.g. ritual_prompt" />
      <input id="cue-payload" placeholder='payload JSON, e.g. {"player_id":"seat-1"}' />
      <button onclick="fireCue()">Fire</button>
    </div>
    <div class="cue-log" id="cue-log"></div>
  </section>

  <section>
    <h1>Scoreboard</h1>
    <div class="scoreboard" id="scoreboard"></div>
  </section>

  <section>
    <h1>Binding board</h1>
    <div class="conn down" id="conn">connecting…</div>
    <table>
      <thead>
        <tr><th>Player</th><th>GID</th><th>State</th><th>Last seen</th><th>Rebind</th></tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none">No players yet.</div>
  </section>

  <script>
    const players = new Map();
    const rowsEl = document.getElementById("rows");
    const emptyEl = document.getElementById("empty");
    const connEl = document.getElementById("conn");

    function fmtAgo(ts) {
      if (!ts) return "—";
      const secs = Math.max(0, (Date.now() / 1000) - ts);
      return secs < 1 ? "now" : `${secs.toFixed(0)}s ago`;
    }

    function render() {
      const list = [...players.values()].sort((a, b) => a.id.localeCompare(b.id, undefined, { numeric: true }));
      emptyEl.style.display = list.length ? "none" : "block";
      rowsEl.innerHTML = list.map((p) => `
        <tr>
          <td>${p.id}${p.display_name ? ` <span style="opacity:.5">(${p.display_name})</span>` : ""}</td>
          <td>${p.gid ?? "—"}</td>
          <td><span class="state ${p.state}">${p.state}</span></td>
          <td>${fmtAgo(p.last_seen_at)}</td>
          <td>
            <input class="rebind-gid" type="number" placeholder="gid" id="rebind-${p.id}" />
            <button onclick="rebind('${p.id}')">Rebind</button>
          </td>
        </tr>
      `).join("");
    }

    window.rebind = async function (playerId) {
      const input = document.getElementById(`rebind-${playerId}`);
      const gid = parseInt(input.value, 10);
      if (!Number.isFinite(gid)) return;
      const resp = await fetch(`/api/admin/players/${encodeURIComponent(playerId)}/rebind`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ gid }),
      });
      if (!resp.ok) {
        const body = await resp.json().catch(() => ({}));
        alert(body.detail || `rebind failed (${resp.status})`);
      }
    };

    function connect() {
      const proto = location.protocol === "https:" ? "wss" : "ws";
      const ws = new WebSocket(`${proto}://${location.host}/ws/admin`);
      ws.onopen = () => { connEl.textContent = "connected"; connEl.className = "conn ok"; };
      ws.onclose = () => {
        connEl.textContent = "disconnected — retrying…";
        connEl.className = "conn down";
        setTimeout(connect, 1500);
      };
      ws.onmessage = (evt) => {
        const msg = JSON.parse(evt.data);
        if (msg.type === "roster") {
          players.clear();
          for (const p of msg.players) players.set(p.id, p);
        } else if (msg.type === "player_update") {
          players.set(msg.player.id, msg.player);
        }
        render();
      };
    }

    window.roundAction = async function (action) {
      const resp = await fetch(`/api/admin/rounds/${action}`, { method: "POST" });
      if (!resp.ok) {
        const body = await resp.json().catch(() => ({}));
        alert(body.detail || `${action} failed (${resp.status})`);
      }
      refreshRound();
    };

    async function refreshRound() {
      try {
        const resp = await fetch("/api/rounds/current");
        const round = resp.ok ? await resp.json() : null;
        const el = document.getElementById("round-status");
        if (!round) {
          el.textContent = "No round loaded.";
        } else {
          el.textContent = `[${round.index}] ${round.question} — ${round.state}`;
        }
      } catch (err) {
        // ignore, try again next tick
      }
    }

    async function refreshScores() {
      try {
        const resp = await fetch("/api/scores");
        const scores = resp.ok ? await resp.json() : {};
        const board = document.getElementById("scoreboard");
        const entries = Object.entries(scores).sort((a, b) => b[1] - a[1]);
        board.innerHTML = entries.length
          ? entries.map(([id, pts]) => `<div class="score-chip">${id}: ${pts}</div>`).join("")
          : `<div class="empty" style="padding:0.5rem 0">No scores yet.</div>`;
      } catch (err) {
        // ignore, try again next tick
      }
    }

    // ---- TD cue stream, mirrored here for rehearsal/debugging ----
    const tdConnEl = document.getElementById("td-conn");
    const cueLogEl = document.getElementById("cue-log");

    function logCue(msg) {
      const line = document.createElement("div");
      const time = new Date().toLocaleTimeString();
      line.textContent = `${time}  ${msg.type}  ${JSON.stringify(msg)}`;
      cueLogEl.prepend(line);
      while (cueLogEl.childElementCount > 50) cueLogEl.removeChild(cueLogEl.lastChild);
    }

    function connectTd() {
      const proto = location.protocol === "https:" ? "wss" : "ws";
      const ws = new WebSocket(`${proto}://${location.host}/ws/td`);
      ws.onopen = () => { tdConnEl.textContent = "connected"; tdConnEl.className = "conn ok"; };
      ws.onclose = () => {
        tdConnEl.textContent = "disconnected — retrying…";
        tdConnEl.className = "conn down";
        setTimeout(connectTd, 1500);
      };
      ws.onmessage = (evt) => logCue(JSON.parse(evt.data));
    }

    window.fireCue = async function () {
      const cueType = document.getElementById("cue-type").value.trim();
      if (!cueType) return;
      const rawPayload = document.getElementById("cue-payload").value.trim();
      let payload = {};
      if (rawPayload) {
        try {
          payload = JSON.parse(rawPayload);
        } catch (err) {
          alert("payload must be valid JSON");
          return;
        }
      }
      const resp = await fetch(`/api/admin/cues/${encodeURIComponent(cueType)}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ payload }),
      });
      if (!resp.ok) {
        const body = await resp.json().catch(() => ({}));
        alert(body.detail || `cue failed (${resp.status})`);
      }
    };

    connect();
    connectTd();
    refreshRound();
    refreshScores();
    setInterval(render, 1000); // keep "last seen" timers fresh
    setInterval(refreshRound, 2000);
    setInterval(refreshScores, 2000);
  </script>
</body>
</html>
